<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GLOBIS — Globes + Polis</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">

  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>

  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/mapbox.css">
  <link rel="stylesheet" href="styles/markers.css">
  <link rel="stylesheet" href="styles/auth.css">
</head>
<body>

  <div id="loading">
    <div class="lname">GLOBIS</div>
    <div class="lsub">Inizializzazione…</div>
    <div class="lbar"><div class="lfill" id="lfill"></div></div>
  </div>

  <div id="map"></div>

  <header>
    <div class="logo">GLOBIS<sub>Globes + Polis</sub></div>
    <div class="hright">
      <div class="live"><div class="ldot"></div>Live · <span id="active-count">3.241</span> attivi</div>
      <button class="btn" id="btn-accedi">Accedi</button>
    </div>
  </header>

  <div id="zpill">Vista globale</div>

  <aside class="stats">
    <div class="scard v"><div class="slabel">Votazioni attive</div><div class="sval" id="sv">247</div><div class="ssub">↑ 18 nelle ultime 2h</div></div>
    <div class="scard n"><div class="slabel">Notizie live</div><div class="sval" id="sn">1.842</div><div class="ssub">da 94 paesi</div></div>
    <div class="scard u"><div class="slabel">Contributi oggi</div><div class="sval" id="su">48.3K</div><div class="ssub">voti espressi</div></div>
  </aside>

  <aside class="feed">
    <div class="fhdr">Feed globale</div>
    <div class="flist" id="flist"></div>
  </aside>

  <div class="wbadge">
    <div class="wlabel">Il tuo peso voto</div>
    <div class="wval">2.4×</div>
    <div class="wbar"><div class="wfill"></div></div>
    <div class="wsub">Base 1.0 · Edu +0.4 · Rep +0.6 · Part +0.4</div>
  </div>

  <div class="legend">
    <div class="li"><div class="ld vote"></div>Votazione</div>
    <div class="li"><div class="ld news"></div>Notizia</div>
    <div class="li"><div class="ld civic"></div>Civico</div>
    <div class="li"><div class="ld emergency"></div>Urgente</div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/data/events.js"></script>
  <script src="js/data/feed.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/auth-modal.js"></script>
  <script src="js/map.js"></script>
  <script src="js/markers.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
